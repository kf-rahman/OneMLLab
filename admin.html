<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Write — Kazi Rahman</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="assets/config.js"></script>
  <style>
    body.editor-open main{ max-width: 1180px; }

    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 6px;
    }
    label .hint {
      font-weight: 400; text-transform: none; letter-spacing: 0;
      font-size: 12px; color: rgba(31,36,34,0.55);
    }
    input, textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 10px;
      background: #fff; color: var(--text);
      font-family: inherit; font-size: 15px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    .row { display: flex; gap: 14px; flex-wrap: wrap; }
    .row .field { flex: 1; min-width: 200px; }
    .row .field.short { flex: 0 0 160px; }

    /* toolbar */
    .toolbar{
      display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
      padding: 6px; border: 1px solid var(--border); border-bottom: 0;
      border-radius: 10px 10px 0 0; background: var(--code-bg);
    }
    .toolbar button{
      border: 1px solid transparent; background: none; color: var(--text);
      font-size: 14px; padding: 5px 9px; border-radius: 7px; cursor: pointer;
      line-height: 1; font-family: inherit;
    }
    .toolbar button:hover{ background: rgba(47,93,80,0.10); color: var(--primary); }
    .toolbar .spacer{ flex: 1; }

    /* editor split */
    .editor-split{
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      border: 1px solid var(--border); border-radius: 0 0 10px 10px;
      overflow: hidden; min-height: 460px;
    }
    .editor-split.is-dragover{ border-color: var(--primary); }
    #body{
      border: 0; border-radius: 0; border-right: 1px solid var(--border);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px; line-height: 1.7; resize: none; min-height: 460px;
    }
    #preview{ padding: 14px 20px; overflow-y: auto; max-height: 70vh; background: var(--bg); }
    #preview .placeholder{ color: rgba(31,36,34,0.4); }
    body.preview-hidden .editor-split{ grid-template-columns: 1fr; }
    body.preview-hidden #body{ border-right: 0; }
    body.preview-hidden #preview{ display: none; }
    @media (max-width: 760px){
      .editor-split{ grid-template-columns: 1fr; }
      #body{ border-right: 0; border-bottom: 1px solid var(--border); }
      #preview{ max-height: 50vh; }
    }

    .actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 18px; }
    button.primary {
      padding: 11px 28px; background: var(--primary); color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
    button.primary:hover:not(:disabled) { opacity: 0.85; }
    button.ghost {
      padding: 11px 20px; background: none; color: var(--primary);
      border: 1px solid var(--border); border-radius: 10px; font-size: 15px;
      cursor: pointer; font-family: inherit;
    }
    button.ghost:hover { background: rgba(47,93,80,0.07); }
    #status { font-size: 14px; line-height: 1.5; }
    #status.ok { color: var(--primary); }
    #status.err { color: #b94040; }
    #status.busy { color: rgba(31,36,34,0.7); }
    .draft-note{ font-size: 12px; color: rgba(31,36,34,0.45); }

    /* login */
    #login-screen { max-width: 380px; }
    #login-screen p { color: rgba(31,36,34,0.75); font-size: 15px; }
    #login-error { color: #b94040; font-size: 14px; min-height: 18px; }
    #editor-screen { display: none; }

    .link-btn {
      font-size: 12px; color: rgba(31,36,34,0.45); cursor: pointer;
      text-decoration: underline; background: none; border: none; padding: 0;
      font-family: inherit;
    }
    .link-btn:hover { color: var(--primary); }

    /* manage list */
    .manage { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 18px; }
    .manage h2 { font-size: 16px; }
    .manage-item {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px; padding: 10px 2px; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .manage-item .t { font-weight: 600; }
    .manage-item .d { font-size: 13px; color: rgba(31,36,34,0.6); margin-left: 8px; }
    .manage-item .acts { display: flex; gap: 14px; }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <a class="brand" href="index.html">Kazi Rahman</a>
      <nav class="navlinks">
        <a href="index.html#blog">Blog</a>
        <a href="admin.html" style="color:var(--primary);font-weight:600">Write</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- Step 1: login -->
    <div id="login-screen">
      <h1>Admin</h1>
      <p>Log in to write and publish.</p>
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="actions">
          <button type="submit" class="primary" id="login-btn">Log in</button>
          <span id="login-error"></span>
        </div>
      </form>
    </div>

    <!-- Step 2: writing studio -->
    <div id="editor-screen">
      <h1 style="margin-bottom:18px">
        <span id="editor-heading">New entry</span>
        <button class="link-btn" id="logout-btn">log out</button>
      </h1>

      <form id="post-form">
        <div class="row">
          <div class="field">
            <label for="title">Title</label>
            <input id="title" type="text" placeholder="What's on your mind?" required autofocus />
          </div>
          <div class="field short">
            <label for="date">Date</label>
            <input id="date" type="date" required />
          </div>
        </div>

        <div class="field">
          <label for="excerpt">Excerpt <span class="hint">— optional, shown in the post list</span></label>
          <input id="excerpt" type="text" placeholder="One line summary" />
        </div>

        <div class="field" style="margin-bottom:18px">
          <label>Body <span class="hint">— Markdown · drag, paste, or click 🖼 to add images</span></label>
          <div class="toolbar" id="toolbar">
            <button type="button" data-md="bold" title="Bold (Ctrl/Cmd+B)"><b>B</b></button>
            <button type="button" data-md="italic" title="Italic (Ctrl/Cmd+I)"><i>I</i></button>
            <button type="button" data-md="h2" title="Heading">H2</button>
            <button type="button" data-md="h3" title="Subheading">H3</button>
            <button type="button" data-md="link" title="Link (Ctrl/Cmd+K)">🔗</button>
            <button type="button" data-md="ul" title="Bullet list">• List</button>
            <button type="button" data-md="quote" title="Quote">❝</button>
            <button type="button" data-md="code" title="Code block">&lt;/&gt;</button>
            <button type="button" id="image-btn" title="Add image">🖼 Image</button>
            <span class="spacer"></span>
            <label style="text-transform:none;letter-spacing:0;margin:0;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:rgba(31,36,34,0.6)">
              <input type="checkbox" id="preview-checkbox" checked style="width:auto" /> Preview
            </label>
          </div>
          <div class="editor-split" id="editor-split">
            <textarea id="body" placeholder="Start writing…"></textarea>
            <div id="preview"><div class="placeholder">Preview appears here as you write.</div></div>
          </div>
          <input type="file" id="image-input" accept="image/*" multiple hidden />
        </div>

        <div class="actions">
          <button type="submit" class="primary" id="publish-btn">Publish</button>
          <button type="button" class="ghost" id="new-btn" style="display:none">New entry</button>
          <span id="status"></span>
          <span class="spacer" style="flex:1"></span>
          <span class="draft-note" id="draft-note"></span>
        </div>
      </form>

      <div class="manage">
        <h2>Your posts</h2>
        <div id="manage-list"><div class="meta">Loading…</div></div>
      </div>
    </div>

  </main>

  <footer>
    <div class="footer-inner">
      <div>Kazi Rahman © 2026</div>
      <div class="footer-links">
        <a href="#">Terms of Service</a>
        <a href="#">Privacy Notice</a>
      </div>
    </div>
  </footer>

  <script>
    const sb = supabase.createClient(window.SUPA.url, window.SUPA.anonKey);
    const md = window.markdownit({ html: false, linkify: true, typographer: true });
    const BUCKET = "post-images";
    const DRAFT_KEY = "draft_onemllab";

    // ── elements ──────────────────────────────────────────────────────────────
    const loginScreen  = document.getElementById("login-screen");
    const editorScreen = document.getElementById("editor-screen");
    const loginForm    = document.getElementById("login-form");
    const loginBtn     = document.getElementById("login-btn");
    const loginError   = document.getElementById("login-error");
    const logoutBtn    = document.getElementById("logout-btn");
    const postForm     = document.getElementById("post-form");
    const publishBtn   = document.getElementById("publish-btn");
    const newBtn       = document.getElementById("new-btn");
    const statusEl     = document.getElementById("status");
    const draftNote    = document.getElementById("draft-note");
    const editorHeading= document.getElementById("editor-heading");
    const titleEl      = document.getElementById("title");
    const dateEl       = document.getElementById("date");
    const excerptEl    = document.getElementById("excerpt");
    const bodyEl       = document.getElementById("body");
    const previewEl    = document.getElementById("preview");
    const split        = document.getElementById("editor-split");
    const imageInput   = document.getElementById("image-input");
    const manageList   = document.getElementById("manage-list");

    let editingId = null;   // null = new post, else id of post being edited

    document.body.classList.add("editor-open");
    function today() { return new Date().toISOString().slice(0, 10); }
    dateEl.value = today();

    // ── auth ────────────────────────────────────────────────────────────────
    function showEditor() { loginScreen.style.display = "none"; editorScreen.style.display = "block"; renderPreview(); loadManageList(); }
    function showLogin()  { loginScreen.style.display = "block"; editorScreen.style.display = "none"; }

    sb.auth.getSession().then(({ data }) => { if (data.session) showEditor(); else showLogin(); });
    sb.auth.onAuthStateChange((_event, session) => { if (session) showEditor(); else showLogin(); });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginError.textContent = "";
      loginBtn.disabled = true; loginBtn.textContent = "Logging in…";
      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      });
      loginBtn.disabled = false; loginBtn.textContent = "Log in";
      if (error) loginError.textContent = error.message;
    });
    logoutBtn.addEventListener("click", () => sb.auth.signOut());

    // ── live preview ──────────────────────────────────────────────────────────
    function renderPreview() {
      const text = bodyEl.value;
      previewEl.innerHTML = text.trim()
        ? '<div class="post-content">' + md.render(text) + "</div>"
        : '<div class="placeholder">Preview appears here as you write.</div>';
    }
    document.getElementById("preview-checkbox").addEventListener("change", (e) => {
      document.body.classList.toggle("preview-hidden", !e.target.checked);
    });

    // ── draft autosave (only for new, unsaved posts) ────────────────────────────
    let draftTimer;
    function saveDraft() {
      if (editingId) return;
      clearTimeout(draftTimer);
      draftTimer = setTimeout(() => {
        localStorage.setItem(DRAFT_KEY, JSON.stringify({
          title: titleEl.value, date: dateEl.value, excerpt: excerptEl.value, body: bodyEl.value,
        }));
        draftNote.textContent = "Draft saved " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }, 400);
    }
    function loadDraft() {
      try {
        const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || "null");
        if (!d) return;
        titleEl.value = d.title || ""; dateEl.value = d.date || today();
        excerptEl.value = d.excerpt || ""; bodyEl.value = d.body || "";
      } catch {}
    }
    loadDraft();
    [titleEl, dateEl, excerptEl, bodyEl].forEach((el) =>
      el.addEventListener("input", () => { saveDraft(); if (el === bodyEl) renderPreview(); })
    );
    renderPreview();

    // ── toolbar / markdown helpers ──────────────────────────────────────────────
    function surround(before, after = before, placeholder = "text") {
      const s = bodyEl.selectionStart, e = bodyEl.selectionEnd;
      const sel = bodyEl.value.slice(s, e) || placeholder;
      bodyEl.setRangeText(before + sel + after, s, e, "select");
      bodyEl.focus(); renderPreview(); saveDraft();
    }
    function linePrefix(prefix) {
      const s = bodyEl.selectionStart;
      const lineStart = bodyEl.value.lastIndexOf("\n", s - 1) + 1;
      bodyEl.setRangeText(prefix, lineStart, lineStart, "end");
      bodyEl.focus(); renderPreview(); saveDraft();
    }
    const mdActions = {
      bold:  () => surround("**"),
      italic:() => surround("*"),
      h2:    () => linePrefix("## "),
      h3:    () => linePrefix("### "),
      ul:    () => linePrefix("- "),
      quote: () => linePrefix("> "),
      link:  () => surround("[", "](https://)", "text"),
      code:  () => surround("\n```\n", "\n```\n", "code"),
    };
    document.getElementById("toolbar").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-md]");
      if (btn && mdActions[btn.dataset.md]) mdActions[btn.dataset.md]();
    });
    bodyEl.addEventListener("keydown", (e) => {
      if (!(e.metaKey || e.ctrlKey)) return;
      const k = e.key.toLowerCase();
      if (k === "b") { e.preventDefault(); mdActions.bold(); }
      if (k === "i") { e.preventDefault(); mdActions.italic(); }
      if (k === "k") { e.preventDefault(); mdActions.link(); }
    });

    // ── images: upload to Supabase storage, insert public URL ────────────────────
    function safeName(name) {
      const dot = name.lastIndexOf(".");
      const base = (dot > 0 ? name.slice(0, dot) : name).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      const ext = (dot > 0 ? name.slice(dot + 1) : "png").toLowerCase().replace(/[^a-z0-9]/g, "") || "png";
      return `${(base || "image").slice(0, 40)}.${ext}`;
    }
    function insertAtCursor(text) {
      const s = bodyEl.selectionStart, e = bodyEl.selectionEnd;
      bodyEl.setRangeText(text, s, e, "end");
      bodyEl.focus(); renderPreview(); saveDraft();
    }
    async function uploadImage(file) {
      if (!file || !file.type.startsWith("image/")) return;
      const placeholder = `\n![uploading ${file.name || "image"}…]()\n`;
      insertAtCursor(placeholder);
      setStatus("busy", "Uploading image…");
      try {
        const path = `${Date.now()}-${Math.random().toString(36).slice(2, 6)}-${safeName(file.name || "pasted.png")}`;
        const { error } = await sb.storage.from(BUCKET).upload(path, file, { contentType: file.type });
        if (error) throw error;
        const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
        const alt = (file.name || "image").replace(/\.[^.]+$/, "");
        bodyEl.value = bodyEl.value.replace(placeholder, `\n![${alt}](${data.publicUrl})\n`);
        renderPreview(); saveDraft(); setStatus("", "");
      } catch (err) {
        bodyEl.value = bodyEl.value.replace(placeholder, "");
        renderPreview();
        setStatus("err", "Image upload failed: " + (err.message || err));
      }
    }
    document.getElementById("image-btn").addEventListener("click", () => imageInput.click());
    imageInput.addEventListener("change", () => { [...imageInput.files].forEach(uploadImage); imageInput.value = ""; });
    bodyEl.addEventListener("paste", (e) => {
      const imgs = [...(e.clipboardData?.items || [])].filter((i) => i.type.startsWith("image/"));
      if (!imgs.length) return;
      e.preventDefault(); imgs.forEach((i) => uploadImage(i.getAsFile()));
    });
    ["dragenter", "dragover"].forEach((ev) => split.addEventListener(ev, (e) => { e.preventDefault(); split.classList.add("is-dragover"); }));
    ["dragleave", "drop"].forEach((ev) => split.addEventListener(ev, (e) => { e.preventDefault(); split.classList.remove("is-dragover"); }));
    split.addEventListener("drop", (e) => { [...(e.dataTransfer?.files || [])].forEach(uploadImage); });

    // ── publish / edit / delete ─────────────────────────────────────────────────
    function toSlug(title) { return title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, ""); }
    function setStatus(cls, html) { statusEl.className = cls; statusEl.innerHTML = html; }

    function resetForm() {
      editingId = null;
      postForm.reset();
      dateEl.value = today();
      editorHeading.textContent = "New entry";
      publishBtn.textContent = "Publish";
      newBtn.style.display = "none";
      draftNote.textContent = "";
      renderPreview();
    }
    newBtn.addEventListener("click", () => { localStorage.removeItem(DRAFT_KEY); resetForm(); setStatus("", ""); window.scrollTo({ top: 0, behavior: "smooth" }); });

    postForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = titleEl.value.trim();
      const post_date = dateEl.value;
      const excerpt = excerptEl.value.trim();
      const body = bodyEl.value;
      if (!title || !post_date) return;

      publishBtn.disabled = true; publishBtn.textContent = editingId ? "Saving…" : "Publishing…";
      setStatus("busy", "Saving…");
      try {
        let slug, savedSlug;
        if (editingId) {
          const { data, error } = await sb.from("posts")
            .update({ title, excerpt, body, post_date }).eq("id", editingId).select("slug").single();
          if (error) throw error;
          savedSlug = data.slug;
        } else {
          slug = toSlug(title) || "post";
          // ensure unique slug
          const { data: clash } = await sb.from("posts").select("id").eq("slug", slug).maybeSingle();
          if (clash) slug = `${slug}-${Math.random().toString(36).slice(2, 6)}`;
          const { data, error } = await sb.from("posts")
            .insert({ slug, title, excerpt, body, post_date }).select("id,slug").single();
          if (error) throw error;
          editingId = data.id; savedSlug = data.slug;
        }
        localStorage.removeItem(DRAFT_KEY);
        editorHeading.textContent = "Editing: " + title;
        publishBtn.textContent = "Save changes";
        newBtn.style.display = "inline-block";
        setStatus("ok", `Published! View it at <a href="post.html?slug=${encodeURIComponent(savedSlug)}" target="_blank">your post</a>.`);
        loadManageList();
      } catch (err) {
        setStatus("err", "Error: " + (err.message || err));
      } finally {
        publishBtn.disabled = false;
      }
    });

    async function loadManageList() {
      const { data, error } = await sb.from("posts").select("id,slug,title,post_date").order("post_date", { ascending: false });
      if (error) { manageList.innerHTML = `<div class="meta">Could not load: ${error.message}</div>`; return; }
      if (!data.length) { manageList.innerHTML = `<div class="meta">No posts yet.</div>`; return; }
      manageList.innerHTML = data.map((p) => `
        <div class="manage-item" data-id="${p.id}">
          <div><span class="t">${escapeHtml(p.title)}</span><span class="d">${p.post_date}</span></div>
          <div class="acts">
            <button class="link-btn" data-act="edit" data-id="${p.id}">edit</button>
            <button class="link-btn" data-act="delete" data-id="${p.id}">delete</button>
          </div>
        </div>`).join("");
    }
    manageList.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const id = btn.dataset.id;
      if (btn.dataset.act === "edit") {
        const { data, error } = await sb.from("posts").select("*").eq("id", id).single();
        if (error) { setStatus("err", error.message); return; }
        editingId = data.id;
        titleEl.value = data.title; dateEl.value = data.post_date;
        excerptEl.value = data.excerpt || ""; bodyEl.value = data.body || "";
        editorHeading.textContent = "Editing: " + data.title;
        publishBtn.textContent = "Save changes";
        newBtn.style.display = "inline-block";
        renderPreview(); setStatus("", "");
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else if (btn.dataset.act === "delete") {
        if (!confirm("Delete this post? This cannot be undone.")) return;
        const { error } = await sb.from("posts").delete().eq("id", id);
        if (error) { setStatus("err", error.message); return; }
        if (editingId === id) resetForm();
        loadManageList();
      }
    });

    function escapeHtml(s) {
      return String(s).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
